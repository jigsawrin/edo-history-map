name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install (lockfile どおり、install script 無効)
        run: npm ci --ignore-scripts
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Verify historical raster fixture package
        run: npm run verify:historical-raster-package
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Static place link audit
        run: npm run audit:static-links
      - name: Historical raster audit
        run: npm run audit:historical-rasters
      - name: Historical control-point catalog audit
        run: npm run audit:historical-control-points
      - name: Historical map display catalog audit
        run: npm run audit:historical-map-display
      - name: Historical reference asset catalog audit
        run: npm run audit:historical-reference-assets
      - name: Historical reference panel registry audit
        run: npm run audit:historical-reference-panels
      - name: Prepublish audit (公開ビルドを含む)
        run: npm run audit:prepublish
      - name: npm audit (high 以上で失敗)
        run: npm audit --audit-level=high

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate
